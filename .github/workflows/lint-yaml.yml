name: Lint YAML

on:
  pull_request:
    paths:
      - '**/*.yaml'
      - '**/*.yml'
      - '.yamllint'
  push:
    branches:
      - main
    paths:
      - '**/*.yaml'
      - '**/*.yml'
      - '.yamllint'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install yamllint
        run: python -m pip install --disable-pip-version-check yamllint==1.37.1

      - name: Run yamllint
        run: yamllint .
