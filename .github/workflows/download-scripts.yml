# 按「脚本 × OS」拆分 job，便于在 Actions 里按名称过滤日志
# 脚本：k8s / tools / nvidia（均为 *-packages-docker.sh）
name: Test download scripts

on:
  workflow_dispatch:
  push:
    paths:
      - 'Script/00-Download-k8s-packages-docker.sh'
      - 'Script/00-Download-tools-packages-docker.sh'
      - 'Script/00-Download-nvidia-packages-docker.sh'
      - 'Script/framework.sh'
      - 'manifests/artifacts.yaml'
      - '.github/workflows/download-scripts.yml'

jobs:
  download:
    name: "${{ matrix.script }} / ${{ matrix.platform }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        script: [k8s, tools, nvidia]
        platform:
          - ubuntu:22.04
          - ubuntu:24.04
          - ubuntu:26.04
          - centos:7
          - rocky:9
          - rocky:9.3
          - rocky:10
          - openeuler:24.03
          - openeuler:24.03-lts-sp4
          - kylin:v10-sp1
          - kylin:v10-sp2
          - kylin:v10-sp3
    env:
      K8S_VERSION: "1.31.11"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run download and verify
        run: |
          set -e
          platform="${{ matrix.platform }}"
          os_id="${platform%%:*}"
          os_version="${platform#*:}"
          OUT="${RUNNER_TEMP}/k8s-deploy-dl-${{ matrix.script }}-${os_id}-${os_version}"
          rm -rf "$OUT"
          mkdir -p "$OUT"

          case "${{ matrix.script }}" in
            k8s)
              bash Script/00-Download-k8s-packages-docker.sh "$os_id" "$os_version" "$OUT" "$K8S_VERSION"
              ;;
            tools)
              bash Script/00-Download-tools-packages-docker.sh "$os_id" "$os_version" "$OUT"
              ;;
            nvidia)
              bash Script/00-Download-nvidia-packages-docker.sh "$os_id" "$os_version" "$OUT"
              ;;
            *)
              echo "unknown matrix.script"
              exit 1
              ;;
          esac

          if [ "${{ matrix.script }}" = "tools" ]; then
            if [ "$os_id" = "ubuntu" ]; then
              count=$(find "$OUT" -mindepth 2 -maxdepth 2 -name '*.deb' 2>/dev/null | wc -l)
            else
              count=$(find "$OUT" -mindepth 2 -maxdepth 2 -name '*.rpm' 2>/dev/null | wc -l)
            fi
          else
            if [ "$os_id" = "ubuntu" ]; then
              count=$(find "$OUT" -maxdepth 1 -name '*.deb' 2>/dev/null | wc -l)
            else
              count=$(find "$OUT" -maxdepth 1 -name '*.rpm' 2>/dev/null | wc -l)
            fi
          fi

          if [ "${count:-0}" -lt 1 ]; then
            echo "ERROR: 下载后无包 script=${{ matrix.script }} platform=${os_id}-${os_version} dir=$OUT"
            exit 1
          fi
          echo "OK: ${count} 个包"
          sudo rm -rf "$OUT"

      - name: Cleanup
        if: always()
        run: |
          platform="${{ matrix.platform }}"
          sudo rm -rf "${RUNNER_TEMP}/k8s-deploy-dl-${{ matrix.script }}-${platform%%:*}-${platform#*:}"
