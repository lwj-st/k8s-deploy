# 按「脚本 × OS」拆分 job，便于在 Actions 里按名称过滤日志
# 脚本：k8s / tools / nvidia（均为 *-packages-docker.sh）
name: Test download scripts

on:
  workflow_dispatch:
  push:
    paths:
      - 'Script/00-Download-k8s-packages-docker.sh'
      - 'Script/00-Download-tools-packages-docker.sh'
      - 'Script/00-Download-nvidia-packages-docker.sh'
      - 'Script/framework.sh'
      - 'manifests/artifacts.yaml'
      - '.github/workflows/download-scripts.yml'

jobs:
  download:
    name: "${{ matrix.script }} / ${{ matrix.os }}-${{ matrix.os_version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        script: [k8s, tools, nvidia]
        include:
          - os: ubuntu
            os_version: "22.04"
          - os: ubuntu
            os_version: "24.04"
          - os: ubuntu
            os_version: "26.04"
          - os: centos
            os_version: "8"
          - os: rocky
            os_version: "9"
          - os: rocky
            os_version: "9.3"
          - os: rocky
            os_version: "10"
          - os: openeuler
            os_version: "24.03"
          - os: openeuler
            os_version: "24.03-lts-sp4"
          - os: kylin
            os_version: "v10-sp1"
          - os: kylin
            os_version: "v10-sp2"
          - os: kylin
            os_version: "v10-sp3"
    env:
      K8S_VERSION: "1.31.11"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run download and verify
        run: |
          set -e
          OUT="${RUNNER_TEMP}/k8s-deploy-dl-${{ matrix.script }}-${{ matrix.os }}-${{ matrix.os_version }}"
          rm -rf "$OUT"
          mkdir -p "$OUT"

          case "${{ matrix.script }}" in
            k8s)
              bash Script/00-Download-k8s-packages-docker.sh "${{ matrix.os }}" "${{ matrix.os_version }}" "$OUT" "$K8S_VERSION"
              ;;
            tools)
              bash Script/00-Download-tools-packages-docker.sh "${{ matrix.os }}" "${{ matrix.os_version }}" "$OUT"
              ;;
            nvidia)
              bash Script/00-Download-nvidia-packages-docker.sh "${{ matrix.os }}" "${{ matrix.os_version }}" "$OUT"
              ;;
            *)
              echo "unknown matrix.script"
              exit 1
              ;;
          esac

          if [ "${{ matrix.script }}" = "tools" ]; then
            if [ "${{ matrix.os }}" = "ubuntu" ]; then
              count=$(find "$OUT" -mindepth 2 -maxdepth 2 -name '*.deb' 2>/dev/null | wc -l)
            else
              count=$(find "$OUT" -mindepth 2 -maxdepth 2 -name '*.rpm' 2>/dev/null | wc -l)
            fi
          else
            if [ "${{ matrix.os }}" = "ubuntu" ]; then
              count=$(find "$OUT" -maxdepth 1 -name '*.deb' 2>/dev/null | wc -l)
            else
              count=$(find "$OUT" -maxdepth 1 -name '*.rpm' 2>/dev/null | wc -l)
            fi
          fi

          if [ "${count:-0}" -lt 1 ]; then
            echo "ERROR: 下载后无包 script=${{ matrix.script }} os=${{ matrix.os }} dir=$OUT"
            exit 1
          fi
          echo "OK: ${count} 个包"
          sudo rm -rf "$OUT"

      - name: Cleanup
        if: always()
        run: sudo rm -rf "${RUNNER_TEMP}/k8s-deploy-dl-${{ matrix.script }}-${{ matrix.os }}-${{ matrix.os_version }}"
