name: Scan Secrets

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          version="8.24.2"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz"
          curl -fsSL "$url" -o /tmp/gitleaks.tar.gz
          tar -C /tmp -xzf /tmp/gitleaks.tar.gz gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Scan new changes in pull requests
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          # Fetch full base history so origin/<base>..HEAD is the real PR diff,
          # not an inflated range caused by a depth=1 tip with no merge-base.
          git fetch --no-tags origin "${{ github.base_ref }}"
          report="/tmp/gitleaks-report.json"
          set +e
          gitleaks git \
            --log-opts="origin/${{ github.base_ref }}..HEAD" \
            --redact \
            --verbose \
            --report-format json \
            --report-path "$report"
          status=$?
          set -e
          if [[ "$status" -ne 0 && -f "$report" ]]; then
            echo "::error::gitleaks found secrets in the PR diff. File summary:"
            jq -r '.[] | "- \(.File):\(.StartLine) rule=\(.RuleID) commit=\(.Commit[0:12])"' "$report"
          fi
          exit "$status"

      - name: Scan new changes on main
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          if ! git rev-parse HEAD^ >/dev/null 2>&1; then
            echo 'No parent commit to compare on this push; skipping diff scan.'
            exit 0
          fi
          report="/tmp/gitleaks-report.json"
          set +e
          gitleaks git \
            --log-opts="HEAD^..HEAD" \
            --redact \
            --verbose \
            --report-format json \
            --report-path "$report"
          status=$?
          set -e
          if [[ "$status" -ne 0 && -f "$report" ]]; then
            echo "::error::gitleaks found secrets on main push. File summary:"
            jq -r '.[] | "- \(.File):\(.StartLine) rule=\(.RuleID) commit=\(.Commit[0:12])"' "$report"
          fi
          exit "$status"
