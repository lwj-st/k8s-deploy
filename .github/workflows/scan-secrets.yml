name: Scan Secrets

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          version="8.24.2"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz"
          curl -fsSL "$url" -o /tmp/gitleaks.tar.gz
          tar -C /tmp -xzf /tmp/gitleaks.tar.gz gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Scan new changes in pull requests
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          git fetch --no-tags origin "${{ github.base_ref }}" --depth=1
          gitleaks git --log-opts="origin/${{ github.base_ref }}..HEAD" --redact

      - name: Scan new changes on main
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            gitleaks git --log-opts="HEAD^..HEAD" --redact
          else
            echo 'No parent commit to compare on this push; skipping diff scan.'
          fi
